# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 2

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Install Coyote CLI
      run: |
        dotnet tool install --global Microsoft.Coyote.CLI
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
    - name: Rewrite for Coyote
      run: |
        coyote rewrite MemoizR.Tests/bin/Debug/net9.0/MemoizR.dll
        coyote rewrite MemoizR.Tests/bin/Debug/net9.0/MemoizR.Reactive.dll
        coyote rewrite MemoizR.Tests/bin/Debug/net9.0/MemoizR.StructuredConcurrency.dll
        coyote rewrite MemoizR.Tests/bin/Debug/net9.0/MemoizR.Tests.dll
    - name: Test
      run: dotnet test --no-build --verbosity normal
      
