# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Generous ceiling: restore + build + Coyote install/rewrite plus the concurrency stress
    # tests (individual budgets up to 20s, convergence polls up to 5s) can exceed a tight limit
    # on the slow matrix legs (ubuntu-24.04-arm, macos-latest) even when every test passes.
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    # Run the regular suite against clean (non-instrumented) assemblies. Coyote's binary
    # rewrite is only needed by the systematic CoyoteTests below; running the whole suite
    # against rewritten assemblies changes exception/timing semantics and adds per-operation
    # overhead, which makes the timing-sensitive tests fail.
    - name: Test
      run: dotnet test --no-build --verbosity normal --filter "FullyQualifiedName!~CoyoteTests"
    - name: Install Coyote CLI
      run: |
        dotnet tool install --global Microsoft.Coyote.CLI
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
    - name: Coyote Rewrite
      run: |
        # Use net10.0 as targeted in the project file. Rewrite in dependency order.
        cd MemoizR.Tests/bin/Debug/net10.0/
        coyote rewrite MemoizR.StructuredAsyncLock.dll
        coyote rewrite MemoizR.dll
        coyote rewrite MemoizR.Reactive.dll
        coyote rewrite MemoizR.StructuredConcurrency.dll
        coyote rewrite MemoizR.Tests.dll
    # Only the systematic concurrency test runs against the rewritten assemblies, where
    # Coyote can fully control scheduling.
    - name: Coyote systematic test
      run: dotnet test --no-build --verbosity normal --filter "FullyQualifiedName~CoyoteTests"

  cognitive-complexity:
    # Gate on SonarSource Cognitive Complexity (rule S3776). The opt-in
    # MeasureCognitiveComplexity build (see Directory.Build.props) enables only
    # S3776 with a per-method threshold of 15 (SonarLint.xml); WarningsAsErrors
    # escalates any method above it to a build error. Single-OS: the metric is
    # platform-independent, so there's no need to run it across the matrix.
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cognitive Complexity gate (S3776 <= 15)
      run: dotnet build -p:MeasureCognitiveComplexity=true -p:WarningsAsErrors=S3776

